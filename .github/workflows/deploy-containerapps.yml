name: Deploy Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/**'
      - '.github/workflows/deploy-containerapps.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-containerapps-production
  cancel-in-progress: true

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  API_APP_NAME: ${{ vars.AZURE_API_APP_NAME }}
  WEB_APP_NAME: ${{ vars.AZURE_WEB_APP_NAME }}
  BACKEND_IMAGE: storage-manager-api
  FRONTEND_IMAGE: storage-manager-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub variables
        run: |
          missing=0
          for name in RESOURCE_GROUP ACR_NAME API_APP_NAME WEB_APP_NAME; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured. Set the GitHub repository variable before deploying."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Resolve Azure targets
        id: azure
        run: |
          ACR_LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
          API_FQDN=$(az containerapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "api_base_url=https://$API_FQDN" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "${BACKEND_IMAGE}:${GITHUB_SHA}" \
            "$GITHUB_WORKSPACE/backend"

      - name: Deploy backend revision
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --image "${{ steps.azure.outputs.acr_login_server }}/${BACKEND_IMAGE}:${GITHUB_SHA}"

      - name: Build frontend image
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "${FRONTEND_IMAGE}:${GITHUB_SHA}" \
            --build-arg VITE_API_URL="${{ steps.azure.outputs.api_base_url }}" \
            "$GITHUB_WORKSPACE/frontend"

      - name: Deploy frontend revision
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --image "${{ steps.azure.outputs.acr_login_server }}/${FRONTEND_IMAGE}:${GITHUB_SHA}"

      - name: Show deployed URLs
        run: |
          API_URL=$(az containerapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$API_APP_NAME" \
            --query properties.configuration.ingress.fqdn -o tsv)
          WEB_URL=$(az containerapp show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --query properties.configuration.ingress.fqdn -o tsv)

          echo "API: https://$API_URL"
          echo "WEB: https://$WEB_URL"
